<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="paiement.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://superdevresources.com/free-payment-method-icons/">
    <title>Panier</title>
</head>
<body>

    <!--ajouter les liens vers la page d'acceuil !-->
    <div class="retour_acceuil">
        <div class="loupe" > 
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="recherche" placeholder="recherche">
        </div>
        <div class="image_retour" >
            <a href="pages.txt"><img src="./WhatsApp Image 2025-09-17 à 12.06.09_85b4bcc9.jpg" alt="image_retour" width="70"></a>

            <div class="categorie">
                <div class="football">
                    <i class="fa-solid fa-futbol"></i>
                </div>

                <div class="basket">
                    <i class="fa-solid fa-basketball"></i>
                </div>

                <div class="tennis">
                    <i class="fa-solid fa-volleyball-ball"></i>
                </div>

            </div>
        </div>

        <div class="shop_profil">
            <div class="user" > 
                <a href="pages.txt"><i class="fa-solid fa-user"></i></a>
            </div>
            <div class="shopping"> 
                <a href="pages.txt"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </div>

    </div>
     <!--premiere partie de la page !-->
    <div class="partie1">
        <div class="votre_panier">
             <h1>CONTENU DE VOTRE PANIER </h1>
        </div>

        <!--ajouter le lien de la page d'acceuil !-->
        
        <div class="retour_achat" onclick="window.open('pages.txt')">
            <span>CONTINUER LES ACHATS</span>
        </div>

        <div class="connexion">
            <h3>VOUS POSSéDEZ UN COMPTE ?</h3>
        <!--ajouter le lien de la de connexion!-->
            <div class="sous-connexion">
                <a href="pages.txt">Connectez-vous</a>
                <span>pour payer plus vite </span>
            </div>      
        </div>

    </div>

    <div class="partie2">
        <h2>PASSER AU PAIEMENT</h2>
    </div> 

    <div class="method_paiement">
        <img src="./apple-pay-brands-solid-full.svg" alt="applepay" width="50">
        <img src="./cc-amex-brands-solid-full.svg" alt="amex" width="50">
        <img src="./cc-mastercard-brands-solid-full.svg" alt="mastercard" width="50">
        <img src="./cc-paypal-brands-solid-full.svg" alt="paypal" width="50">
        <img src="./cc-visa-brands-solid-full.svg" alt="visa" width="50">
        <img src="./google-pay-brands-solid-full.svg" alt="googlepay" width="50">
    </div>
       
    

</body>

<footer>
    <div class="footer">
    <i class="fa-brands fa-snapchat icon"></i>
    <i class="fa-brands fa-instagram icon"></i>
    <i class="fa-brands fa-x-twitter icon"></i>
    <i class="fa-brands fa-facebook icon"></i>
    <i class="fa-brands fa-linkedin icon"></i>
    </div>

    <div class="avis">
        <h3>LAISSEZ VOS AVIS</h3>
        <textarea name="avis" id="avis" placeholder="Dites-nous tout"></textarea>
        <input type="submit" placeholder="envoyer">

    </div>
</footer>
</html>
